version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: sbs_rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - sbs_network

  redis:
    image: redis:alpine
    container_name: sbs_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - sbs_network

networks:
  sbs_network:
    driver: bridge

volumes:
  rabbitmq_data:
  redis_data:
